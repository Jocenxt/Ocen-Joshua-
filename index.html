  <style>
    :root {
      --pl-purple: #38003c;
      --pl-neon: #00ff85;
      --pl-pink: #e90052;
      --pl-white: #ffffff;
      --pl-dark: #111111;
      --pl-border: 3px solid var(--pl-dark);
      --pl-shadow: 5px 5px 0px var(--pl-dark);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Trebuchet MS', 'Impact', sans-serif;
    }

    /* Page Fade-In Animation */
    body {
      background-color: #f2f2f2;
      color: var(--pl-dark);
      padding: 20px;
      animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* Scoreboard Top Bar */
    .scoreboard-header {
      background-color: var(--pl-purple);
      color: var(--pl-white);
      border: var(--pl-border);
      box-shadow: var(--pl-shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      margin-bottom: 25px;
      border-radius: 8px;
    }

    .league-badge {
      background-color: var(--pl-neon);
      color: var(--pl-purple);
      font-weight: 900;
      padding: 6px 12px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.9rem;
      border: 2px solid var(--pl-dark);
    }

    .live-clock {
      color: var(--pl-neon);
      font-family: monospace;
      font-size: 1.1rem;
      font-weight: bold;
    }

    /* Arsenal-style Banner Heading */
    .hero-banner {
      background: linear-gradient(135deg, #db0007 0%, #990005 100%);
      border: var(--pl-border);
      box-shadow: var(--pl-shadow);
      text-align: center;
      padding: 40px 20px;
      margin-bottom: 25px;
      border-radius: 8px;
      position: relative;
    }

    .brand-title {
      font-size: 3.5rem;
      font-weight: 900;
      color: var(--pl-white);
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 3px 3px 0px var(--pl-dark);
      margin-bottom: 10px;
      font-family: 'Impact', sans-serif;
    }

    .subtitle {
      color: #ffcccc;
      font-size: 1.2rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 15px;
    }

    /* Premier League Styled Navigation Button with Hover Effect */
    .pl-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--pl-dark);
      color: var(--pl-neon);
      font-weight: 900;
      font-size: 1.1rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 6px;
      border: 3px solid var(--pl-neon);
      box-shadow: 4px 4px 0px var(--pl-pink);
      transition: all 0.2s ease-in-out;
      margin-top: 10px;
      cursor: pointer;
    }

    .pl-btn:hover {
      background: var(--pl-neon);
      color: var(--pl-dark);
      box-shadow: 6px 6px 0px var(--pl-pink);
      transform: translateY(-3px);
    }

    .pl-btn-arrow {
      font-size: 1.3rem;
      transition: transform 0.2s ease;
    }

    .pl-btn:hover .pl-btn-arrow {
      transform: translateX(5px);
    }

    /* Grid Layout for Content */
    .main-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }

      .main-grid {
        grid-template-columns: 1fr;
      }
      .brand-title {
        font-size: 2.8rem;
      }
    }
